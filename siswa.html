<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siswa - Kirim Jawaban AutoGrader</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="top-nav" id="main-nav-siswa">
        <div class="brand-logo-small">AG</div>
        <div class="user-profile">
            <span id="user-name">Siswa Memuat...</span>
            <span class="badge">SISWA</span>
            <button id="btn-logout-siswa" class="btn-outline">Keluar</button>
        </div>
    </nav>

<div class="main-container">
        
        <div class="header-left">
            <h1>Ruang Tugas Siswa</h1>
            <p>Pilih tugas dan unggah foto lembar jawabanmu di sini.</p>
        </div>

        <div id="panel-daftar-tugas">
            <div class="toolbar-tugas">
                <div class="search-box">
                    <input type="text" id="input-cari-siswa" placeholder="🔍 Cari judul tugas...">
                </div>
                <div class="filter-box">
                    <select id="select-filter-mapel-siswa">
                        <option value="">Semua Mapel</option>
                    </select>
                </div>
            </div>

            <div id="container-tugas-siswa" class="grid-tugas">
                <p class="loading-text">Memuat tugas terbarumu...</p>
            </div>
        </div>

        <div id="panel-detail-tugas" class="hidden">
            <button id="btn-kembali" class="btn-outline" style="margin-bottom: 20px;">
                🔙 Kembali ke Daftar Tugas
            </button>

            <div class="task-info">
                <strong id="detail-judul-tugas" style="font-size: 18px;">Memuat Judul...</strong>
                <span id="detail-mapel-tugas" class="student-name">Mata Pelajaran</span>
            </div>

            <div class="form-group" style="margin-bottom: 25px;">
                <label style="font-weight: bold; display: block; margin-bottom: 10px;">📋 File Soal dari Guru:</label>
                <div id="list-file-soal">
                    </div>
            </div>

            <hr class="separator" style="margin: 30px 0;">

            <div id="area-upload-jawaban">
                <label style="font-weight: bold; font-size: 16px; display: block; margin-bottom: 15px;">
                    📤 Unggah Lembar Jawaban Anda
                </label>
                
                <label class="upload-area" for="file-jawaban">
                    <div class="upload-icon">📸</div>
                    <p class="upload-text" id="status-pilih-file"><span>Klik untuk pilih foto</span> atau ambil gambar</p>
                    <p class="upload-hint">Format: JPG, PNG, PDF (Maks 5MB)</p>
                </label>
                <input type="file" id="file-jawaban" accept="image/*, .pdf" style="display: none;">

                <button id="btn-kirim-jawaban" class="submit-btn" style="margin-top: 10px;">
                    🚀 Kirim Jawaban Sekarang
                </button>
            </div>
        </div>

        <div style="margin-top: 50px;">
            <h3>Status Pengiriman Terakhir</h3>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Tugas</th>
                            <th>Tanggal Kirim</th>
                            <th>Status</th>
                            <th>Nilai AI</th>
                        </tr>
                    </thead>
                    <tbody id="riwayat-tugas-siswa">
                        <tr><td colspan="4" style="text-align:center; color:#9ca3af;">Belum ada tugas yang dikirim.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="script_siswa.js"></script>
</body>
</html>
