<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoGrader AI</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">

    <div id="toast-container"></div>

    <div class="main-container">

        <div id="view-login" class="role-view">
            <div class="header">
                <div class="brand-logo">AG</div>
                <h1>Masuk ke Akun</h1>
                <p>Silakan masukkan email dan kata sandi Anda untuk mengakses dashboard.</p>
            </div>

            <div class="login-form">
                <label for="input-email" style="display:block; margin-bottom: 5px; font-size: 14px; font-weight: 600;">Email Sekolah</label>
                <input type="email" id="input-email" class="input-field" placeholder="contoh: sugiarno@sekolah.com">
                
                <label for="input-password" style="display:block; margin-bottom: 5px; margin-top: 15px; font-size: 14px; font-weight: 600;">Kata Sandi</label>
                <input type="password" id="input-password" class="input-field" placeholder="Masukkan kata sandi">
                
                <button class="submit-btn" id="btn-login" style="margin-top: 25px;">Masuk ke Dashboard</button>
                
                <p id="login-error" class="error-text" style="display: none; color: var(--danger); font-size: 13px; margin-top: 10px;">
                    Login gagal. Silakan periksa email dan password Anda.
                </p>
            </div>

            <div class="login-footer" style="margin-top: 40px; text-align: center; color: var(--text-muted); font-size: 12px;">
                <p>&copy; 2026 AutoGrader AI System. Hak Cipta Dilindungi.</p>
            </div>
        </div>

    </div>

    <div id="global-loader" class="hidden">
        <div class="spinner"></div>
        <p id="loader-text">Memeriksa Kredensial...</p>
    </div>

    <script type="module" src="./script.js"></script>

</body>
</html>
